<?xml version="1.0" encoding="UTF-8"?>
<svg width="1284" height="2778" viewBox="0 0 1284 2778" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="splashGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1284" height="2778" fill="url(#splashGradient)"/>
  
  <!-- Thai Pattern Background -->
  <g opacity="0.05">
    <circle cx="200" cy="400" r="150" fill="white"/>
    <circle cx="1084" cy="400" r="150" fill="white"/>
    <circle cx="200" cy="2378" r="150" fill="white"/>
    <circle cx="1084" cy="2378" r="150" fill="white"/>
    <circle cx="642" cy="1389" r="200" fill="white"/>
  </g>
  
  <!-- App Icon (centered) -->
  <g transform="translate(642, 1100)">
    <!-- Note head -->
    <ellipse cx="-60" cy="90" rx="70" ry="55" fill="white" transform="rotate(-20 -60 90)"/>
    
    <!-- Note stem -->
    <rect x="-8" y="-150" width="30" height="240" fill="white" rx="15"/>
    
    <!-- Note flag -->
    <path d="M 22 -150 Q 120 -110 120 -40 Q 120 0 80 15 L 22 -15 Z" fill="white"/>
    <path d="M 22 -100 Q 100 -70 100 -15 Q 100 15 70 25 L 22 0 Z" fill="white"/>
  </g>
  
  <!-- App Name -->
  <text x="642" y="1500" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Musical Instruments
  </text>
  
  <!-- Thai Name -->
  <text x="642" y="1600" font-family="Arial, sans-serif" font-size="56" fill="white" text-anchor="middle" opacity="0.9">
    เครื่องดนตรี
  </text>
  
  <!-- Loading Text -->
  <text x="642" y="2400" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle" opacity="0.7">
    Loading...
  </text>
  
  <!-- Loading Dots Animation -->
  <g opacity="0.7">
    <circle cx="582" cy="2480" r="12" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="642" cy="2480" r="12" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="702" cy="2480" r="12" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
</svg>
